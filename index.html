<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="icon" type="image/png" href="uploads/logoColon.png">
<link rel="stylesheet" href="_ds/samplia-design-system-3b8c391a-4304-4ac7-a11b-0dd4cb4af9a4/colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; background: #020f30; }
  a { color: #cfe0ff; text-decoration: none; }
  a:hover { color: #ffffff; }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .lc-icon { -webkit-mask-position: center; mask-position: center; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-size: contain; mask-size: contain; }
  /* ---- Desktop enhancements ---- */
  @media (min-width: 860px) {
    #lc-hero-inner { padding-top: 44px !important; }
    #colon-logo { position: absolute !important; top: 24px !important; left: 28px !important; width: 156px !important; margin: 0 !important; z-index: 4; }
    #lc-titular { padding-top: 6px !important; }
    #lc-steps { flex-direction: row !important; align-items: stretch !important; padding: 34px 20px !important; }
    #lc-steps-inner { flex-direction: row !important; align-items: stretch !important; width: 100% !important; }
    .lc-step { flex: 1 1 0 !important; flex-direction: column !important; text-align: center !important; align-items: center !important; gap: 12px !important; padding: 4px 26px !important; }
    .lc-step + .lc-step { border-left: 1px solid rgba(255,255,255,0.14) !important; }
    .lc-step-txt { text-align: center !important; }
    #lc-footer-inner { max-width: 760px !important; }
    #lc-cta-btn { width: auto !important; min-width: 320px; }
  }
</style>
</helmet>
<div style="min-height:100vh; position:relative; overflow-x:hidden; color:#fff; background:linear-gradient(180deg, #05163a 0%, #04123180 34%, #020e28 100%);">

  <!-- ============ HERO ============ -->
  <section id="lc-hero" style="position:relative; background:linear-gradient(to bottom, rgba(5,22,58,0) 56%, #05163a 100%), url('uploads/bg.jpg') center top / cover no-repeat;">
    <div id="lc-hero-inner" style="max-width:1180px; margin:0 auto; padding:26px 20px 26px; position:relative; text-align:center;">
      <img id="colon-logo" src="uploads/logoColon.png" alt="Colon" style="width:118px; height:auto; display:block; margin:0 auto -14px; position:relative; z-index:3; filter:drop-shadow(0 6px 16px rgba(0,0,0,0.4));">

      <div id="lc-titular" style="position:relative; z-index:2;">
        <div style="font-family:'Brandon Grotesque','Montserrat',sans-serif; font-weight:900; font-size:clamp(13px,3.9vw,26px); line-height:1.05; letter-spacing:0.01em; white-space:nowrap; text-transform:uppercase; text-shadow:0 0 18px rgba(120,200,255,0.45), 0 2px 6px rgba(0,0,0,0.35); margin:0 auto 12px;">La limpieza de toda la vida</div>
        <div style="display:inline-block; background:#FFE500; color:#E30613; font-weight:800; font-size:clamp(25px,8.4vw,58px); line-height:1; letter-spacing:0.01em; text-transform:uppercase; padding:9px 24px 11px; border-radius:12px; box-shadow:0 8px 26px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.08);">Ahora cuesta menos</div>
      </div>

      <div style="max-width:660px; margin:16px auto 6px;">
        <img src="uploads/bodegon3.png" alt="Productos Colon" style="width:100%; height:auto; display:block; filter:drop-shadow(0 22px 40px rgba(0,0,0,0.45));">
      </div>

      <div style="font-weight:800; font-size:clamp(24px,7.6vw,50px); line-height:1.05; text-shadow:0 2px 10px rgba(0,0,0,0.4); margin:10px auto 8px;">
        Consigue hasta <span style="color:#FF2A1C; font-size:1.28em; text-shadow:0 0 16px rgba(255,60,40,0.5);">4€</span> de regalo
      </div>
    </div>
  </section>

  <!-- ============ STEPS ============ -->
  <section id="lc-steps" style="max-width:1180px; margin:14px auto 8px; padding:20px 20px; display:flex; flex-direction:column; gap:20px; background:rgba(255,255,255,0.045); border:1px solid rgba(255,255,255,0.08); border-radius:20px;">
    <div id="lc-steps-inner" style="display:flex; flex-direction:column; gap:20px; width:fit-content; max-width:100%; margin:0 auto;">
    <div class="lc-step" style="display:flex; align-items:center; gap:16px;">
      <div style="flex:none; width:38px; height:38px; border-radius:999px; background:#E30613; color:#fff; font-weight:800; font-size:19px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(227,6,19,0.4);">1</div>
      <img src="assets/step-1.svg" alt="" style="flex:none; display:block; width:46px; height:46px;">
      <div class="lc-step-txt" style="text-align:left;">
        <div style="font-weight:800; font-size:19px; text-transform:uppercase; letter-spacing:0.02em; line-height:1.05;">Compra</div>
        <div style="font-weight:400; font-size:14px; color:#cfe0ff; line-height:1.25; margin-top:2px;">Productos seleccionados Colon</div>
      </div>
    </div>
    <div class="lc-step" style="display:flex; align-items:center; gap:16px;">
      <div style="flex:none; width:38px; height:38px; border-radius:999px; background:#E30613; color:#fff; font-weight:800; font-size:19px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(227,6,19,0.4);">2</div>
      <img src="assets/step-2.svg" alt="" style="flex:none; display:block; width:46px; height:46px;">
      <div class="lc-step-txt" style="text-align:left;">
        <div style="font-weight:800; font-size:19px; text-transform:uppercase; letter-spacing:0.02em; line-height:1.05;">Sube</div>
        <div style="font-weight:400; font-size:14px; color:#cfe0ff; line-height:1.25; margin-top:2px;">Tu ticket y tus datos a través del formulario</div>
      </div>
    </div>
    <div class="lc-step" style="display:flex; align-items:center; gap:16px;">
      <div style="flex:none; width:38px; height:38px; border-radius:999px; background:#E30613; color:#fff; font-weight:800; font-size:19px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(227,6,19,0.4);">3</div>
      <img src="assets/step-3.svg" alt="" style="flex:none; display:block; width:46px; height:46px;">
      <div class="lc-step-txt" style="text-align:left;">
        <div style="font-weight:800; font-size:19px; text-transform:uppercase; letter-spacing:0.02em; line-height:1.05;">Recibe tu dinero</div>
        <div style="font-weight:400; font-size:14px; color:#cfe0ff; line-height:1.25; margin-top:2px;">Directamente en tu cuenta</div>
      </div>
    </div>
    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer id="lc-footer" style="margin-top:30px; background:#041634; border-top:1px solid rgba(255,255,255,0.08);">
    <div id="lc-footer-inner" style="max-width:1180px; margin:0 auto; padding:24px 20px calc(130px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; align-items:center; gap:16px;">
      <img src="uploads/logo_samplia_footer.png" alt="Samplia" style="height:34px; width:auto; display:block;">
      <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px 22px; font-weight:600; font-size:14px;">
        <a href="#">Bases legales</a>
        <a href="https://www.airwickcashback.com/privacidad.pdf" target="_blank" rel="noopener">Política de privacidad</a>
      </div>
      <div style="font-weight:400; font-size:12px; color:#8ea6cc; text-align:center;">© 2026 Samplia · Promoción sujeta a bases legales.</div>
    </div>
  </footer>

  <!-- ============ STICKY CTA ============ -->
  <div id="lc-cta" style="position:fixed; left:0; right:0; bottom:0; z-index:50; padding:14px 20px calc(14px + env(safe-area-inset-bottom)); display:flex; justify-content:center; background:transparent; pointer-events:none;">
    <button id="lc-cta-btn" type="button" onClick="{{ onSubir }}" style="pointer-events:auto; width:100%; max-width:440px; border:none; cursor:pointer; background:#C73346; color:#fff; font-family:'Barlow',sans-serif; font-weight:800; font-size:18px; letter-spacing:0.01em; padding:16px 40px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,0.35); transition:transform 120ms, background 220ms;" style-hover="background:#B32A3C;" style-active="transform:scale(0.97);">Subir ticket</button>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      onSubir: () => { window.open('https://participa.samplia.com/lacoladaconcashback', '_blank', 'noopener'); },
    };
  }
}
</script>
</body>
</html>
